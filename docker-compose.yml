version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models
      - ./backend/presets:/app/presets
      - storage:/app/storage
    environment:
      - DEVICE=cpu
      - MAX_IMAGE_SIZE=400

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  storage:
